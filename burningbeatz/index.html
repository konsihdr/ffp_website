<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="utf-8" />
        <meta name="description" content="" />
        <meta name="author" content="Konstantin Hoerder" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Burning Beats FFP</title>
        <!-- Analytics -->
        <script defer data-domain="feuerwehr-poettmes.de" src="https://analytics.hdr-it.de/js/script.js"></script>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="/css/styles.css" rel="stylesheet" />
    </head>
    <body id="page-top">
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-light fixed-top" id="mainNav">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="/">Feuerwehr Pöttmes</a>
            </div>
        </nav>
        <!-- Masthead-->
        <header class="masthead_bb">
            <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
                <div class="d-flex justify-content-center">
                    <div class="text-center">
                        <p class="countdown-label mb-2">days : hours : minutes : seconds</p>
                        <h1 class="mx-auto my-0 text-uppercase">00:00:00:00</h1>
                    </div>
                </div>
            </div>
        </header>
        
        <!-- Footer-->
        <footer class="footer bg-black small text-center text-white-50"><div class="container px-4 px-lg-5">Made with ❤️ by <a href="https://hdr-it.de">hdr-it.de</a> 2023 | With the help of <a href="https://startbootstrap.com/theme/grayscale">Grayscale</a></div></footer>


        <!-- Countdown Script -->
        <script>
            function updateCountdown() {
                const targetDate = new Date('2026-06-03T00:00:00').getTime();
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    document.querySelector('.masthead_bb h1').textContent = '00:00:00:00';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                const formattedCountdown =
                    String(days).padStart(2, '0') + ':' +
                    String(hours).padStart(2, '0') + ':' +
                    String(minutes).padStart(2, '0') + ':' +
                    String(seconds).padStart(2, '0');

                document.querySelector('.masthead_bb h1').textContent = formattedCountdown;
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);
        </script>
    </body>
</html>
